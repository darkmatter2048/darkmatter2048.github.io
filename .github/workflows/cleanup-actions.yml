name: Cleanup Actions Artifacts & Runs

on:
  schedule:
    # Run weekly at 04:30 UTC on Sunday (off-peak, not at :00/:30 to avoid fleet thundering herd)
    - cron: "37 4 * * 0"
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Delete runs older than N days"
        required: false
        default: "3"
        type: string
      keep_min_runs:
        description: "Keep at least this many recent runs per workflow"
        required: false
        default: "1"
        type: string
      dry_run:
        description: "Dry-run (list what would be deleted, don't actually delete)"
        type: boolean
        required: false
        default: false

permissions:
  actions: write   # Required to delete workflow runs
  contents: read   # Required to read repo metadata

jobs:
  cleanup:
    name: Cleanup old workflow runs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Compute retention parameters
        id: params
        shell: bash
        run: |
          RETENTION_DAYS="${{ github.event.inputs.retention_days || '30' }}"
          KEEP_MIN="${{ github.event.inputs.keep_min_runs || '10' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "retention_days=${RETENTION_DAYS}" >> "$GITHUB_OUTPUT"
          echo "keep_min=${KEEP_MIN}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "cutoff_date=$(date -u -d "${RETENTION_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Cleanup workflow runs
        shell: bash
        run: |
          set -euo pipefail

          RETENTION_DAYS="${{ steps.params.outputs.retention_days }}"
          KEEP_MIN="${{ steps.params.outputs.keep_min }}"
          DRY_RUN="${{ steps.params.outputs.dry_run }}"
          CUTOFF_DATE="${{ steps.params.outputs.cutoff_date }}"
          REPO="${{ github.repository }}"

          echo "=============================================="
          echo " Cleanup Configuration"
          echo "=============================================="
          echo " Repository:      ${REPO}"
          echo " Retention days:  ${RETENTION_DAYS} (cutoff: ${CUTOFF_DATE})"
          echo " Keep min runs:   ${KEEP_MIN}"
          echo " Dry run:         ${DRY_RUN}"
          echo "=============================================="

          # ------------------------------------------------------------------
          # Fetch all workflow runs with pagination
          # ------------------------------------------------------------------
          echo ""
          echo ">>> Fetching workflow runs..."

          # We fetch runs in pages of 100. The API returns up to 100 per page.
          PAGE=1
          ALL_RUNS_FILE=$(mktemp)

          while true; do
            echo "  Fetching page ${PAGE}..."
            RESP=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO}/actions/runs?per_page=100&page=${PAGE}" \
              2>&1) || {
                echo "::warning::gh api failed on page ${PAGE}: ${RESP}"
                break
              }

            # Extract run ids, names, status, created_at, and conclusion
            COUNT=$(echo "$RESP" | jq '.workflow_runs | length')
            echo "  Page ${PAGE}: ${COUNT} runs"

            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            echo "$RESP" | jq -r '.workflow_runs[] | [.id, .name, .status, .conclusion, .created_at, .head_branch] | @tsv' >> "$ALL_RUNS_FILE"

            PAGE=$((PAGE + 1))
          done

          TOTAL=$(wc -l < "$ALL_RUNS_FILE")
          echo ""
          echo ">>> Total runs fetched: ${TOTAL}"

          if [ "$TOTAL" -eq 0 ]; then
            echo "No runs found. Exiting."
            exit 0
          fi

          # ------------------------------------------------------------------
          # Separate runs by workflow name, sort by date descending
          # ------------------------------------------------------------------
          echo ""
          echo ">>> Analyzing runs by workflow..."

          # Get unique workflow names
          WORKFLOW_NAMES=$(cut -f2 "$ALL_RUNS_FILE" | sort -u)

          DELETED=0
          KEPT=0

          while IFS= read -r WF_NAME; do
            echo ""
            echo "--- Workflow: ${WF_NAME} ---"

            # Get runs for this workflow, sorted by created_at descending (newest first)
            WF_RUNS=$(grep -F "$WF_NAME" "$ALL_RUNS_FILE" | sort -t$'\t' -k5,5r)

            WF_TOTAL=$(echo "$WF_RUNS" | wc -l)
            echo "  Total runs: ${WF_TOTAL}"

            COUNT=0
            while IFS=$'\t' read -r run_id run_name status conclusion created_at head_branch; do
              COUNT=$((COUNT + 1))
              SHOULD_DELETE=false
              REASON=""

              # Always keep in-progress / queued runs
              if [ "$status" = "in_progress" ] || [ "$status" = "queued" ] || [ "$status" = "waiting" ]; then
                SHOULD_DELETE=false
                REASON="active run"
              # Keep the most recent KEEP_MIN runs
              elif [ "$COUNT" -le "$KEEP_MIN" ]; then
                SHOULD_DELETE=false
                REASON="within keep_min (${COUNT} <= ${KEEP_MIN})"
              # Delete if older than retention
              elif [[ "$created_at" < "$CUTOFF_DATE" ]]; then
                SHOULD_DELETE=true
                REASON="older than ${RETENTION_DAYS} days (created: ${created_at})"
              else
                SHOULD_DELETE=false
                REASON="within retention window"
              fi

              if [ "$SHOULD_DELETE" = true ]; then
                if [ "$DRY_RUN" = "true" ]; then
                  echo "  [DRY-RUN] Would delete: run #${run_id} (${run_name}) — ${REASON}"
                else
                  echo "  Deleting: run #${run_id} (${run_name}) — ${REASON}"
                  DELETE_RESP=$(gh api \
                    --method DELETE \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "/repos/${REPO}/actions/runs/${run_id}" 2>&1) || {
                      echo "  ::warning::Failed to delete run #${run_id}: ${DELETE_RESP}"
                      continue
                    }
                  echo "    -> Deleted (artifacts + logs removed)"
                fi
                DELETED=$((DELETED + 1))
              else
                KEPT=$((KEPT + 1))
              fi
            done <<< "$WF_RUNS"

          done <<< "$WORKFLOW_NAMES"

          # ------------------------------------------------------------------
          # Summary
          # ------------------------------------------------------------------
          echo ""
          echo "=============================================="
          echo " Cleanup Summary"
          echo "=============================================="
          if [ "$DRY_RUN" = "true" ]; then
            echo " Mode:            DRY-RUN (no actual deletions)"
          else
            echo " Mode:            LIVE"
          fi
          echo " Runs kept:       ${KEPT}"
          echo " Runs deleted:    ${DELETED}"
          echo " Total processed: $((KEPT + DELETED))"
          echo "=============================================="

          rm -f "$ALL_RUNS_FILE"

        env:
          GH_TOKEN: ${{ github.token }}
